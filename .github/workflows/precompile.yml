name: Precompile Binaries

on:
  push:
    # Trigger this when you push a new release tag (e.g., v1.0.0)
    tags:
      - 'v*'

jobs:
  Precompile:
    runs-on: ${{ matrix.os }}

    permissions:
      contents: write
    
    
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macOS-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      
      - name: Install GTK (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev protobuf-compiler
        
      # iOS / macOS / Windows build
      - name: Precompile (macOS & Windows)
        if: matrix.os == 'macOS-latest' || matrix.os == 'windows-latest'
        # Adjust --repository to your actual GitHub user/repo string
        run: dart run bin/build_tool.dart precompile-binaries -v --manifest-dir=../rust --repository=integrityph/spark_dart
        working-directory: ./build_tool
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRIVATE_KEY: ${{ secrets.RELEASE_PRIVATE_KEY }}
          
      - name: Patch NDK 27 legacy symlinks for Cargokit
        if: matrix.os == 'ubuntu-latest'
        run: |
          # 1. Dynamically find the NDK 27 version currently installed on the GitHub Runner
          NDK_VERSION=$(ls /usr/local/lib/android/sdk/ndk | grep "^27\." | head -n 1)
          echo "Found NDK 27 Version: $NDK_VERSION"
          
          # 2. Save it to GITHUB_ENV so the Cargokit step can use it dynamically
          echo "NDK_VERSION=$NDK_VERSION" >> $GITHUB_ENV
          
          # 3. Navigate into that specific NDK's bin folder
          cd /usr/local/lib/android/sdk/ndk/$NDK_VERSION/toolchains/llvm/prebuilt/linux-x86_64/bin
          
          # 4. Recreate the legacy tool names, pointing them to LLVM safely
          for arch in arm-linux-androideabi aarch64-linux-android i686-linux-android x86_64-linux-android; do
            sudo ln -sf llvm-ar $arch-ar
            sudo ln -sf llvm-strip $arch-strip
            sudo ln -sf llvm-nm $arch-nm
            sudo ln -sf llvm-ranlib $arch-ranlib
          done

      # Android build
      - name: Precompile (with Android)
        if: matrix.os == 'ubuntu-latest'
        # Crucial fix: The flag below is now --android-ndk-version= env.NDK_VERSION
        run: dart run bin/build_tool.dart precompile-binaries -v --manifest-dir=../rust --repository=integrityph/spark_dart --android-sdk-location=/usr/local/lib/android/sdk --android-ndk-version=${{ env.NDK_VERSION }} --android-min-sdk-version=23
        working-directory: ./build_tool
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRIVATE_KEY: ${{ secrets.RELEASE_PRIVATE_KEY }}