name: Precompile Binaries

on:
  push:
    # Trigger this when you push a new release tag (e.g., v1.0.0)
    tags:
      - 'v*'

jobs:
  Precompile:
    runs-on: ${{ matrix.os }}

    permissions:
      contents: write
    
    
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macOS-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      
      - name: Install GTK (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev protobuf-compiler
        
      # iOS / macOS / Windows build
      - name: Precompile (macOS & Windows)
        if: matrix.os == 'macOS-latest' || matrix.os == 'windows-latest'
        # Adjust --repository to your actual GitHub user/repo string
        run: dart run bin/build_tool.dart precompile-binaries -v --manifest-dir=../rust --repository=integrityph/spark_dart
        working-directory: ./build_tool
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRIVATE_KEY: ${{ secrets.RELEASE_PRIVATE_KEY }}
          
      - name: Patch NDK 27 legacy symlinks for Cargokit
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd /usr/local/lib/android/sdk/ndk/27.0.12077973/toolchains/llvm/prebuilt/linux-x86_64/bin
          # Recreate the legacy tool names Cargokit expects, pointing them to LLVM
          for arch in arm-linux-androideabi aarch64-linux-android i686-linux-android x86_64-linux-android; do
            sudo ln -s llvm-ar $arch-ar
            sudo ln -s llvm-strip $arch-strip
            sudo ln -s llvm-nm $arch-nm
            sudo ln -s llvm-ranlib $arch-ranlib
          done

      # Android build
      - name: Precompile (with Android)
        if: matrix.os == 'ubuntu-latest'
        # Crucial: Using NDK 27+ ensures the 16KB page size alignment is preserved during any internal stripping
        run: dart run bin/build_tool.dart precompile-binaries -v --manifest-dir=../rust --repository=integrityph/spark_dart --android-sdk-location=/usr/local/lib/android/sdk --android-ndk-version=27.0.12077973 --android-min-sdk-version=23
        working-directory: ./build_tool
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRIVATE_KEY: ${{ secrets.RELEASE_PRIVATE_KEY }}