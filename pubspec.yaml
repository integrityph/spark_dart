name: spark_dart
description: "A new Flutter package project."
version: 0.0.1
homepage:

environment:
  sdk: ^3.9.2
  flutter: ">=1.17.0"

dependencies:
  bech32: ^0.2.2
  bech32m_i: ^0.2.2
  bitcoin_base: ^7.1.0
  blockchain_utils: ^6.0.0
  bolt11_decoder: ^1.0.2
  collection: ^1.19.1
  convert: ^3.1.2
  crypto: ^3.0.7
  decimal: ^2.3.3
  ffi: ^2.2.0
  fixnum: ^1.1.1
  flutter:
    sdk: flutter
  flutter_rust_bridge: 2.12.0
  graphql: ^5.2.4
  grpc: ^5.1.0
  http: ^1.6.0
  mutex: ^3.1.0
  pointycastle: ^4.0.0
  protobuf: ^6.0.0
  rust_lib_spark_dart:
    path: rust_builder
  uuid: ^4.5.3
  boringssl_ffi:
    git:
      url: https://github.com/integrityph/boringssl_ffi
      ref: v0.2.0
  secp256k1_ffi:
    git:
      url: https://github.com/integrityph/secp256k1_ffi
      ref: v0.1.1
  bip32_key_derivation:
    git:
      url: https://github.com/integrityph/bip32_key_derivation
      ref: v0.1.1
  biometric_signature: ^12.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter

